<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبۆردی بەڕێوەبردن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Vazirmatn', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-800 p-8">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-bold mb-6 text-blue-600 border-b pb-4">داشبۆردی کۆنتڕۆڵکردنی وێبسایت</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div>
                <label class="block text-sm font-bold mb-2">GitHub Username</label>
                <input type="text" id="ghUser" class="w-full border p-3 rounded-lg bg-gray-50" placeholder="ناوی ئەکاونت">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Repository Name</label>
                <input type="text" id="ghRepo" class="w-full border p-3 rounded-lg bg-gray-50" placeholder="ناوی ڕیپۆزیتۆری">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Personal Access Token</label>
                <input type="password" id="ghToken" class="w-full border p-3 rounded-lg bg-gray-50" placeholder="ghp_xxxxxxxx">
            </div>
        </div>

        <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold w-full mb-6 transition">
            هێنانەی داتاکان لە گیتهەبەوە
        </button>

        <label class="block text-sm font-bold mb-2">دەستکاری کردنی زانیارییەکان (JSON):</label>
        <textarea id="jsonEditor" class="w-full h-96 border p-4 rounded-lg bg-gray-900 text-green-400 font-mono text-sm mb-6 shadow-inner" dir="ltr"></textarea>

        <button onclick="saveData()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold w-full transition text-lg shadow-lg">
            پاشەکەوتکردن و ناردن بۆ گیتهەب
        </button>
        <p id="statusMsg" class="mt-4 text-center font-bold"></p>
    </div>

    <script>
        let fileSha = '';

        async function fetchData() {
            const user = document.getElementById('ghUser').value;
            const repo = document.getElementById('ghRepo').value;
            const token = document.getElementById('ghToken').value;
            const msg = document.getElementById('statusMsg');

            if(!user || !repo || !token) {
                msg.innerHTML = '<span class="text-red-500">تکایە هەموو بۆشاییەکان پڕبکەرەوە!</span>';
                return;
            }

            msg.innerHTML = '<span class="text-blue-500">لە هێنانیدایە...</span>';

            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/data.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if(response.ok) {
                    const data = await response.json();
                    fileSha = data.sha; // پێویستە بۆ ئاپدەیتکردن
                    // داتاکە بە base64 کۆد کراوە، دەبێت وەریگێڕین
                    const decodedData = decodeURIComponent(escape(atob(data.content)));
                    document.getElementById('jsonEditor').value = JSON.stringify(JSON.parse(decodedData), null, 2);
                    msg.innerHTML = '<span class="text-green-500">داتاکان بە سەرکەوتووی هێنران! دەتوانیت دەستکاری بکەیت.</span>';
                } else {
                    msg.innerHTML = `<span class="text-red-500">هەڵە هەیە: دڵنیابە لە ناوەکان و تۆکنەکە.</span>`;
                }
            } catch(e) {
                msg.innerHTML = `<span class="text-red-500">هەڵە لە پەیوەندی: ${e.message}</span>`;
            }
        }

        async function saveData() {
            const user = document.getElementById('ghUser').value;
            const repo = document.getElementById('ghRepo').value;
            const token = document.getElementById('ghToken').value;
            const newJson = document.getElementById('jsonEditor').value;
            const msg = document.getElementById('statusMsg');

            if(!fileSha) {
                msg.innerHTML = '<span class="text-red-500">تکایە سەرەتا داتاکان بهێنە پێش ئەوەی پاشەکەوتی بکەیت!</span>';
                return;
            }

            msg.innerHTML = '<span class="text-blue-500">لە پاشەکەوتکردندایە...</span>';

            try {
                // کۆدکردنی داتا نوێیەکە بۆ base64
                const encodedData = btoa(unescape(encodeURIComponent(newJson)));

                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/data.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Update portfolio data via Dashboard',
                        content: encodedData,
                        sha: fileSha
                    })
                });

                if(response.ok) {
                    const result = await response.json();
                    fileSha = result.content.sha; // نوێکردنەوەی sha بۆ جاری داهاتوو
                    msg.innerHTML = '<span class="text-green-600 text-xl">✅ بە سەرکەوتوویی لە وێبسایتەکەت بڵاوکرایەوە!</span>';
                } else {
                    msg.innerHTML = '<span class="text-red-500">هەڵە لە پاشەکەوتکردن!</span>';
                }
            } catch(e) {
                msg.innerHTML = `<span class="text-red-500">هەڵە: ${e.message}</span>`;
            }
        }
    </script>
</body>
</html>
