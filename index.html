<!DOCTYPE html>
<html lang="ku" dir="rtl" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RV Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;800;900&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="https://github.com/kurd-apps/rv/blob/main/images/icon-512x512.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #fafafa;
            color: #111;
            margin: 0;
            overflow-x: hidden;
        }

        .project-card:hover img {
            transform: scale(1.05);
        }

        .project-card img {
            transition: transform 0.5s ease;
        }

        #particles-js,
        #universeCanvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .relative-z {
            position: relative;
            z-index: 10;
        }

        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .business-slide {
            opacity: 0;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
            transform: translateY(10px);
            position: absolute;
            inset: 0;
            visibility: hidden;
        }

        .business-slide.active {
            opacity: 1;
            transform: translateY(0);
            z-index: 10;
            position: relative;
            visibility: visible;
        }

        .slider-slide {
            opacity: 0;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
            position: absolute;
            inset: 0;
            transform: scale(1.05);
            z-index: 0;
            visibility: hidden;
        }

        .slider-slide.active {
            opacity: 1;
            transform: scale(1);
            z-index: 10;
            visibility: visible;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="antialiased relative">

    <!-- Header -->
    <header class="fixed w-full top-0 bg-[#020617]/90 backdrop-blur-md z-40 border-b border-white/10 shadow-lg">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center relative z-50">
            <div id="navLogoContainer"
                class="h-10 w-10 md:h-12 md:w-12 bg-white rounded-full flex items-center justify-center shadow-lg overflow-hidden">
                <span class="font-black text-xl uppercase text-[#020617]">RV</span>
            </div>
            <nav class="hidden md:flex gap-8 font-bold text-sm text-slate-300">
                <a href="#home" class="hover:text-sky-400 transition" data-ku="سەرەتا" data-en="Home">سەرەتا</a>
                <a href="#about" class="hover:text-sky-400 transition" data-ku="دەربارە" data-en="About">دەربارە</a>
                <a href="#experience" class="hover:text-sky-400 transition" data-ku="ئەزموون"
                    data-en="Experience">ئەزموون</a>

                    data-en="Works">کارەکانم</a>

                <button id="mobileMenuBtn" class="md:hidden text-slate-300 text-2xl"><i
                        class="fa-solid fa-bars"></i></button>
            </div>
        </div>
        <div id="mobileMenu"
            class="hidden absolute top-full left-0 w-full bg-[#020617]/95 border-b border-white/10 py-6 px-6 flex flex-col gap-6 text-center font-bold text-slate-300 z-40">
            <a href="#home" class="mobile-link" data-ku="سەرەتا" data-en="Home">سەرەتا</a>
            <a href="#about" class="mobile-link" data-ku="دەربارە" data-en="About">دەربارە</a>
            <a href="#experience" class="mobile-link" data-ku="ئەزموون" data-en="Experience">ئەزموون</a>
            <a href="#projects" class="mobile-link" data-ku="کارەکانم" data-en="Works">کارەکانم</a>
            <a href="#contact" class="mobile-link" data-ku="پەیوەندی" data-en="Contact">پەیوەندی</a>

    <!-- Home (Hero) -->
    <section id="home" class="relative pt-32 pb-16 px-6 min-h-[85vh] flex items-center bg-[#020617] overflow-hidden">
        <canvas id="universeCanvas"></canvas>
        <div class="max-w-7xl mx-auto flex flex-col-reverse md:flex-row items-center gap-12 relative-z w-full">
            <div class="flex-1 text-center md:text-start mt-6 md:mt-0">
                <h1 id="heroName"
                    class="text-4xl md:text-6xl lg:text-7xl font-black mb-4 text-white tracking-tight leading-tight min-h-[80px]">
                    ...</h1>
                <h2 id="heroTitle"
                    class="text-xl md:text-2xl font-bold text-sky-400 mb-6 bg-white/5 inline-block px-5 py-2 rounded-xl border border-white/10 backdrop-blur-sm">
                    ...</h2>
                <div id="heroSocials" class="flex justify-center md:justify-start gap-5 mt-4 text-3xl text-slate-300">
                </div>
            </div>
            <div class="w-64 h-64 md:w-[400px] md:h-[400px] shrink-0 relative group">
                <div
                    class="absolute -inset-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full blur-xl opacity-30 group-hover:opacity-50 transition duration-1000">
                </div>
                <img id="heroImage" src=""
                    class="w-full h-full object-cover rounded-full shadow-2xl relative z-10 border-4 border-[#020617] bg-slate-900">
            </div>
        </div>
    </section>

    <!-- About -->
    <section id="about" class="py-20 bg-white px-6">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            <div class="space-y-6">
                <h3 id="aboutTitle" class="text-sm font-bold uppercase tracking-widest text-gray-400 border-b pb-2"
                    data-ku="دەربارەی من" data-en="About Me">About Me</h3>
                <p id="aboutDesc" class="text-lg md:text-xl text-gray-700 leading-relaxed text-justify">...</p>
            </div>
            <div
                class="bg-indigo-50 p-8 md:p-10 rounded-[2.5rem] border border-indigo-100 shadow-sm relative overflow-hidden min-h-[350px] flex items-center">
                <div id="businessSliderContainer" class="w-full relative z-10"></div>
            </div>

    <!-- Experience & Skills -->
    <section id="experience" class="py-24 px-6 bg-gray-50">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
            <!-- Experience -->
            <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col">
                <h3 class="text-2xl font-black mb-10 border-b pb-4 text-indigo-600 text-center" data-ku="ئەزموونەکان"
                    data-en="Experience">Experience</h3>
                <div id="cvList" class="space-y-10 border-r-2 border-indigo-100 pr-6 mr-2 flex-grow"></div>
            </div>
            <!-- Skills -->
            <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col">
                <h3 class="text-2xl font-black mb-10 border-b pb-4 text-indigo-600 text-center" data-ku="شارەزاییەکان"

    <!-- Projects -->
    <section id="projects"
        class="py-24 bg-slate-900 mt-12 mx-4 md:mx-8 rounded-[3rem] shadow-2xl relative overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10">
        </div>
        <div class="px-6 max-w-7xl mx-auto relative z-10">
            <h3 class="text-3xl font-black mb-16 border-b border-slate-800 pb-4 text-center text-white"
                data-ku="هەڵبژاردەی کارەکانم" data-en="Selected Works">Selected Works</h3>
            <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-16"></div>
            <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 min-h-[400px]"></div>

            <!-- Pagination -->
            <div id="projectsPagination"
                class="mt-16 flex flex-wrap justify-center items-center gap-3 bg-white px-8 py-4 rounded-full shadow-lg border border-gray-100 max-w-fit mx-auto overflow-hidden">
                <!-- Content will be injected by JS -->
            </div>
        </div>
    </section>

    <!-- Partners -->
    <section class="py-16 px-6 max-w-7xl mx-auto text-center border-t border-gray-200">
        <h3 class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-12"
            data-ku="ئەو لایەنانەی کارم لەگەڵ کردوون" data-en="Partners">Partners</h3>
        <div id="clientsGrid"
            class="flex flex-wrap justify-center items-center gap-12 md:gap-20 opacity-70 hover:opacity-100 transition duration-500">
        </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="pt-24 pb-12 bg-gray-900 text-white px-6 rounded-t-[3rem]">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-4xl md:text-5xl font-black mb-16 text-center" data-ku="با پێکەوە کار بکەین"
                data-en="Let's Work Together">Let's Work Together</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-16">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 text-lg font-bold" id="contactInfoContainer"></div>
                <div class="bg-gray-800 p-8 rounded-3xl shadow-xl">
                    <form action="https://api.web3forms.com/submit" method="POST" class="space-y-6 text-right">
                        <input type="hidden" name="access_key" id="formAccessKey" value="">
                        <div><label class="block text-sm text-gray-400 mb-2" data-ku="ناوت"
                                data-en="Name">ناو</label><input type="text" name="name" required
                                class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:border-indigo-500 outline-none">
                        </div>
                        <div><label class="block text-sm text-gray-400 mb-2" data-ku="ئیمەیڵەکەت"
                                data-en="Email">ئیمەیڵ</label><input type="email" name="email" required
                                class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:border-indigo-500 outline-none"
                                dir="ltr"></div>
                        <div><label class="block text-sm text-gray-400 mb-2" data-ku="نامەکەت"
                                data-en="Message">نامەکەت</label><textarea name="message" required
                                class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:border-indigo-500 outline-none h-32"></textarea>
                        </div>
                        <button type="submit"
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition"
                            data-ku="ناردنی نامە" data-en="Send Message">ناردنی نامە</button>
                    </form>
                </div>
            </div>
            <div class="border-t border-gray-800 pt-8 text-center text-sm text-gray-500">&copy; <span
                    id="currentYear"></span> <span id="footerName"></span>. All rights reserved.</div>
        </div>
    </section>

    <!-- Project Detail View -->
    <div id="projectDetailView" class="hidden fixed inset-0 z-[100] bg-[#fafafa] overflow-y-auto"></div>

    <!-- Full Image View -->
    <div id="fullImageView" class="hidden fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-6">
        <button onclick="closeFullView()"
            class="absolute top-6 right-6 text-white text-3xl hover:text-indigo-400 transition"><i
                class="fa-solid fa-xmark"></i></button>
        <img id="fullImage" src="" class="max-w-full max-h-full object-contain shadow-2xl">
    </div>

    <script>
        const SUPABASE_URL = 'https://wclqffzqwakuxfdtnokr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjbHFmZnpxd2FrdXhmZHRub2tyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDA2OTAsImV4cCI6MjA5MzQ3NjY5MH0.i9ABcGv6B4f399hXWuPCa0O4XnD8rkU1qPfjj-Iom60';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentLang = 'ku';
        let siteData = { sections: {}, projects: [] };
        let businessSlideIndex = 0;
        let businessSlideInterval;
        let typingTimeout;
        let modernSlideIndex = 0;
        let modernSliderInterval;

        // Projects Filtering and Pagination
        let filteredProjects = [];
        let currentCategory = 'All';
        let currentPage = 1;
        const itemsPerPage = 6;

        // Mobile Menu
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            mobileMenuBtn.querySelector('i').className = mobileMenu.classList.contains('hidden') ? 'fa-solid fa-bars' : 'fa-solid fa-xmark';
        });
        document.querySelectorAll('.mobile-link').forEach(l => l.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
            mobileMenuBtn.querySelector('i').className = 'fa-solid fa-bars';
        }));

        // Universe Canvas
        let canvas, ctx, w, h; const stars = [];
        function initUniverse() {
            canvas = document.getElementById('universeCanvas'); if (!canvas) return;
            ctx = canvas.getContext('2d'); w = canvas.width = window.innerWidth; h = canvas.height = canvas.parentElement.offsetHeight;
            stars.length = 0;
            for (let i = 0; i < 300; i++) { stars.push({ x: Math.random() * w, y: Math.random() * h, size: Math.random() * 2, speed: Math.random() * 0.5 + 0.1, opacity: Math.random() }); }
            drawUniverse();
        }
        function drawUniverse() {
            if (!ctx) return; ctx.fillStyle = '#020617'; ctx.fillRect(0, 0, w, h);
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.globalAlpha = s.opacity; ctx.fill();
                s.y -= s.speed; if (s.y < 0) { s.y = h; s.x = Math.random() * w; }
            });
            requestAnimationFrame(drawUniverse);
        }
        window.addEventListener('resize', initUniverse);

        function typeWriter(elementId, text, i = 0, isDeleting = false) {
            const el = document.getElementById(elementId); if (!el) return;
            clearTimeout(typingTimeout);
            if (!isDeleting) {
                el.innerText = text.substring(0, i + 1); i++;
                if (i === text.length) typingTimeout = setTimeout(() => typeWriter(elementId, text, i, true), 2500);
                else typingTimeout = setTimeout(() => typeWriter(elementId, text, i, false), 100);
            } else {
                el.innerText = text.substring(0, i - 1); i--;
                if (i === 0) typingTimeout = setTimeout(() => typeWriter(elementId, text, i, false), 500);
                else typingTimeout = setTimeout(() => typeWriter(elementId, text, i, true), 50);
            }
        }

        async function init() {
            const { data: projs } = await supabaseClient.from('projects').select('*').order('created_at', { ascending: false });
            const { data: content } = await supabaseClient.from('site_content').select('*');
            siteData.projects = projs || [];
            filteredProjects = [...siteData.projects];
            content?.forEach(r => siteData.sections[r.id] = r.content);
            renderUI(); initUniverse(); animateStats();
        }

        function renderUI() {
            const isKu = currentLang === 'ku';
            document.documentElement.lang = isKu ? 'ku' : 'en';
            document.documentElement.dir = isKu ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-ku]').forEach(el => { el.innerText = el.getAttribute('data-' + currentLang); });

            const sec = siteData.sections;
            const heroData = sec.hero || {};

            // Hero
            const welcome = isKu ? `بەخێربێن، من ${heroData.name?.ku || ''}م` : `Welcome, I am ${heroData.name?.en || ''}`;
            document.getElementById('heroName').classList.add('typing-cursor');
            typeWriter('heroName', welcome);
            document.getElementById('heroTitle').innerText = heroData.title?.[currentLang] || '';
            document.getElementById('heroImage').src = heroData.image || '';
            if (heroData.imagePosY !== undefined) document.getElementById('heroImage').style.objectPosition = `center ${heroData.imagePosY}%`;
            else if (heroData.imagePos) document.getElementById('heroImage').style.objectPosition = `${heroData.imagePos.x}% ${heroData.imagePos.y}%`;

            // About
            const aboutData = sec.about || {};
            document.getElementById('aboutDesc').innerText = aboutData.desc?.[currentLang] || '';

            let hSocs = ''; let socBoxes = '';
            const socs = sec.socials || {};
            const socStyle = "bg-gray-800 border border-gray-700 hover:bg-indigo-600 text-gray-400 hover:text-white flex items-center justify-center rounded-2xl transition duration-300 text-3xl h-24 w-full";

            const addSoc = (link, icon, label) => {
                if (!link) return;
                hSocs += `<a href="${link}" target="_blank" class="hover:text-sky-400 transition" title="${label}"><i class="${icon}"></i></a>`;
                socBoxes += `<a href="${link}" target="_blank" class="${socStyle}" title="${label}"><i class="${icon}"></i></a>`;
            };

            addSoc(socs.facebook, 'fa-brands fa-facebook', 'Facebook');
            addSoc(socs.instagram, 'fa-brands fa-instagram', 'Instagram');
            addSoc(socs.youtube, 'fa-brands fa-youtube', 'YouTube');
            addSoc(socs.behance, 'fa-brands fa-behance', 'Behance');
            addSoc(socs.linkedin, 'fa-brands fa-linkedin-in', 'LinkedIn');
            addSoc(socs.github, 'fa-brands fa-github', 'GitHub');
            addSoc(socs.whatsapp, 'fa-brands fa-whatsapp', 'WhatsApp');

            document.getElementById('heroSocials').innerHTML = hSocs;

            // Business Slider
            const bContainer = document.getElementById('businessSliderContainer');
            if (sec.businesses) {
                bContainer.innerHTML = sec.businesses.map((b, i) => `
                    <div class="business-slide ${i === 0 ? 'active' : ''} w-full flex flex-col lg:flex-row items-center gap-8 text-center lg:text-start">
                        ${b.logo ? `<div class="w-24 h-24 shrink-0 bg-white rounded-2xl p-4 shadow-sm border border-indigo-100 flex items-center justify-center overflow-hidden"><img src="${b.logo}" class="max-w-full max-h-full object-contain"></div>` : ''}
                        <div class="flex-1">
                            <h3 class="text-2xl font-black text-indigo-900 mb-2">${b.heading?.[currentLang] || ''}</h3>
                            <p class="text-gray-800 text-lg leading-relaxed">${b.desc?.[currentLang] || ''}</p>
                            ${b.socials ? `
                                <div class="flex justify-center lg:justify-start gap-5 mt-5 text-2xl">
                                    ${b.socials.website ? `<a href="${b.socials.website}" target="_blank" class="text-indigo-600 hover:text-indigo-800 transition"><i class="fa-solid fa-globe"></i></a>` : ''}
                                    ${b.socials.facebook ? `<a href="${b.socials.facebook}" target="_blank" class="text-indigo-600 hover:text-indigo-800 transition"><i class="fa-brands fa-facebook"></i></a>` : ''}
                                    ${b.socials.instagram ? `<a href="${b.socials.instagram}" target="_blank" class="text-indigo-600 hover:text-indigo-800 transition"><i class="fa-brands fa-instagram"></i></a>` : ''}
                                </div>
                            ` : ''}
                        </div>
                    </div>`).join('');
                startBusinessSlider();
            }

            // CV & Skills
            const parseCVDate = (str) => {
                if (!str) return 0;
                const end = str.split('-').pop().trim().toLowerCase();
                if (end === 'present' || end === 'ئێستا') return Date.now();
                const parts = end.split('/');
                if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]).getTime();
                return parseInt(end) || 0;
            };

            const sortedCv = [...(sec.cv || [])].filter(item => item.role?.[currentLang]).sort((a, b) => parseCVDate(b.date || b.year) - parseCVDate(a.date || a.year));
            const cvListEl = document.getElementById('cvList');
            cvListEl.innerHTML = sortedCv.map(item => `
                <div class="relative">
                    <div class="absolute top-1.5 w-4 h-4 bg-indigo-600 rounded-full border-4 border-white ${isKu ? '-right-8' : '-left-8'}"></div>
                    <h4 class="text-xl font-black text-gray-900">${item.role?.[currentLang] || ''}</h4>
                    <p class="text-indigo-600 font-bold text-sm mb-2">${(item.company || item.place)?.[currentLang] || ''} • ${item.date || item.year || ''}</p>
                    ${item.desc?.[currentLang] ? `<p class="text-gray-600">${item.desc[currentLang]}</p>` : ''}
                </div>`).join('');

            if (sortedCv.length > 5) {
                cvListEl.classList.add('max-h-[600px]', 'overflow-y-auto', 'custom-scrollbar', 'pr-4');
                cvListEl.style.scrollBehavior = 'smooth';
            } else {
                cvListEl.classList.remove('max-h-[600px]', 'overflow-y-auto', 'custom-scrollbar', 'pr-4');
            }

            const sortedSkills = [...(sec.skills || [])].sort((a, b) => (b.percent || 0) - (a.percent || 0));
            document.getElementById('skillsList').innerHTML = sortedSkills.map(s => {
                const nameHtml = `<div class="flex-1">${s.name?.[currentLang] || ''}</div>`;
                const progressHtml = `<div class="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden"><div class="bg-indigo-600 h-full transition-all duration-1000" style="width: ${s.percent}%"></div></div>`;
                const percentHtml = `<div class="w-16 ${isKu ? 'text-left' : 'text-right'}">${s.percent}%</div>`;

                return `<div class="flex items-center gap-4">
                    ${nameHtml + progressHtml + percentHtml}
                </div>`;
            }).join('');

            // Contact info
            const contact = sec.contact || {};
            document.getElementById('formAccessKey').value = contact.formKey || '';
            document.getElementById('contactInfoContainer').innerHTML = `
                <div class="bg-gray-800 p-6 rounded-3xl flex flex-col justify-center border border-gray-700">
                    <span class="text-gray-400 text-xs mb-2 uppercase tracking-widest">${isKu ? 'ئیمەیڵ' : 'Email'}</span>
                    <span class="text-sm break-all">${contact.email || ''}</span>
                </div>
                <div class="bg-gray-800 p-6 rounded-3xl flex flex-col justify-center border border-gray-700">
                    <span class="text-gray-400 text-xs mb-2 uppercase tracking-widest">${isKu ? 'مۆبایل' : 'Phone'}</span>
                    <span dir="ltr" class="text-sm">${contact.phone || ''}</span>
                </div>
                <div class="bg-gray-800 p-6 rounded-3xl flex flex-col justify-center border border-gray-700">
                    <span class="text-gray-400 text-xs mb-2 uppercase tracking-widest">${isKu ? 'ناونیشان' : 'Location'}</span>
                    <span class="text-sm">${contact.address?.[currentLang] || ''}</span>
                </div>
                <div class="grid grid-cols-2 gap-3">${socBoxes}</div>`;

            document.getElementById('currentYear').innerText = new Date().getFullYear();
            document.getElementById('footerName').innerText = heroData.name?.[currentLang] || 'RV';

            // Clients
            document.getElementById('clientsGrid').innerHTML = (sec.partners || []).map(img => `<img src="${img}" class="h-16 grayscale hover:grayscale-0 transition object-contain">`).join('');

            // Projects
            renderProjectsGrid();
        }

        function startBusinessSlider() {
            clearInterval(businessSlideInterval);
            const slides = document.querySelectorAll('.business-slide'); if (slides.length <= 1) return;
            businessSlideInterval = setInterval(() => {
                slides.forEach(s => s.classList.remove('active'));
                businessSlideIndex = (businessSlideIndex + 1) % slides.length;
                slides[businessSlideIndex].classList.add('active');
            }, 6000);
        }

        function animateStats() {
            const isKu = currentLang === 'ku';
            const allLabel = isKu ? 'هەموو' : 'All';
            const counts = { [allLabel]: siteData.projects.length };

            siteData.projects.forEach(p => {
                const cats = (p.category || '').split(',').map(c => c.trim()).filter(Boolean);
                cats.forEach(cat => {
                    counts[cat] = (counts[cat] || 0) + 1;
                });
            });

            const grid = document.getElementById('statsGrid');
            grid.innerHTML = Object.keys(counts).map(cat => `
                <div onclick="filterProjects('${cat}')" class="cursor-pointer bg-white p-6 rounded-3xl border ${currentCategory === cat ? 'border-indigo-500 ring-2 ring-indigo-100' : 'border-gray-100'} shadow-sm text-center transition hover:shadow-md">
                    <div class="text-4xl font-black text-indigo-600 mb-2 stat-counter" data-target="${counts[cat]}">0</div>
                    <div class="text-sm font-bold text-gray-500 uppercase">${cat}</div>
                </div>`).join('');
            document.querySelectorAll('.stat-counter').forEach(el => {
                const target = +el.getAttribute('data-target'); let curr = 0;
                const update = setInterval(() => { curr++; if (curr >= target) { el.innerText = target; clearInterval(update); } else el.innerText = curr; }, 50);
            });
        }

        function filterProjects(category) {
            const isKu = currentLang === 'ku';
            currentCategory = category;
            currentPage = 1;

            if (category === 'All' || category === 'هەموو') {
                filteredProjects = [...siteData.projects];
            } else {
                filteredProjects = siteData.projects.filter(p => {
                    const cats = (p.category || '').split(',').map(c => c.trim().toLowerCase());
                    const target = category.trim().toLowerCase();
                    
                    if (target === 'website' || target === 'وێبسایت') {
                        return cats.includes('website') || cats.includes('وێبسایت');
                    }
                    return cats.includes(target);
                });
            }
            animateStats();
            renderProjectsGrid();
            document.getElementById('projects').scrollIntoView({ behavior: 'smooth' });
        }

        function renderProjectsGrid() {
            const isKu = currentLang === 'ku';
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredProjects.slice(start, end);

            document.getElementById('projectsGrid').innerHTML = pageItems.map((p, i) => {
                const realIndex = siteData.projects.indexOf(p);
                const cats = (p.category || '').split(',').map(c => c.trim()).filter(Boolean);
                
                return `
                <div onclick="openProject(${realIndex})" class="project-card bg-white rounded-3xl shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 overflow-hidden flex flex-col relative cursor-pointer">
                    ${p.price ? `<div class="absolute top-4 ${isKu ? 'left-4' : 'right-4'} bg-green-500 text-white px-3 py-1 rounded-full text-[10px] font-black z-20 shadow-lg">${p.price}</div>` : ''}
                    <div class="w-full h-64 overflow-hidden relative">
                        <img src="${p.banner_image || p.images?.[0]}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                    </div>
                    <div class="p-6 flex-grow flex flex-col">
                        <div class="flex flex-wrap gap-1.5 mb-3">
                            ${cats.map(c => `<span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-wider border border-indigo-100/50">${c}</span>`).join('')}
                        </div>
                        <h3 class="text-xl font-black mb-3 text-gray-900 group-hover:text-indigo-600 transition-colors">${p.title?.[currentLang] || p.title}</h3>
                        <p class="text-gray-500 text-sm line-clamp-2 leading-relaxed">${p.short_desc?.[currentLang] || ''}</p>
                    </div>
                </div>`;
            }).join('');

            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredProjects.length / itemsPerPage);
            const container = document.getElementById('projectsPagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }

            let html = '';
            const isKu = currentLang === 'ku';

            // Prev
            html += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="w-10 h-10 flex items-center justify-center rounded-full text-indigo-600 hover:bg-indigo-50 disabled:opacity-30 disabled:pointer-events-none transition"><i class="fa-solid ${isKu ? 'fa-chevron-right' : 'fa-chevron-left'}"></i></button>`;

            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    if (i === currentPage) {
                        html += `<div class="relative w-10 h-10 flex items-center justify-center"><div class="absolute inset-0 bg-indigo-600 rotate-45 rounded-xl"></div><span class="relative z-10 text-white font-bold">${i}</span></div>`;
                    } else {
                        html += `<button onclick="changePage(${i})" class="w-10 h-10 flex items-center justify-center rounded-xl text-gray-500 hover:text-indigo-600 font-bold hover:bg-indigo-50 transition">${i}</button>`;
                    }
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span class="text-gray-300">...</span>`;
                }
            }

            // Next
            html += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="w-10 h-10 flex items-center justify-center rounded-full text-indigo-600 hover:bg-indigo-50 disabled:opacity-30 disabled:pointer-events-none transition"><i class="fa-solid ${isKu ? 'fa-chevron-left' : 'fa-chevron-right'}"></i></button>`;

            // Go to page
            html += `
                <div class="flex items-center gap-3 mr-4 border-l ${isKu ? 'border-l-0 border-r pr-4' : 'pl-4'} border-gray-100">
                    <span class="text-gray-400 text-sm font-bold">${isKu ? 'بڕۆ بۆ' : 'Go to page'}</span>
                    <input type="number" id="jumpPageInput" class="w-12 h-9 border border-gray-200 rounded-lg text-center font-bold text-sm focus:border-indigo-500 outline-none" min="1" max="${totalPages}" value="${currentPage}">
                    <button onclick="jumpToPage()" class="text-indigo-600 font-bold text-sm flex items-center gap-1 hover:underline">${isKu ? 'بڕۆ' : 'Go'} <i class="fa-solid ${isKu ? 'fa-chevron-left' : 'fa-chevron-right'} text-[10px]"></i></button>
                </div>
            `;

            container.innerHTML = html;
        }

        function changePage(page) {
            const totalPages = Math.ceil(filteredProjects.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderProjectsGrid();
            document.getElementById('projectsGrid').scrollIntoView({ behavior: 'smooth' });
        }

        function jumpToPage() {
            const val = parseInt(document.getElementById('jumpPageInput').value);
            if (val) changePage(val);
        }

        function openProject(index) {
            const p = siteData.projects[index]; const isKu = currentLang === 'ku';
            const detail = document.getElementById('projectDetailView');
            document.body.style.overflow = 'hidden';
            detail.classList.remove('hidden'); detail.scrollTop = 0;

            let html = `<div class="max-w-6xl mx-auto pt-32 pb-20 px-6">
                <button onclick="closeProjectView()" class="mb-10 text-gray-500 hover:text-indigo-600 font-bold flex items-center gap-2 transition text-lg bg-white px-5 py-2 rounded-full shadow-sm"><i class="fa-solid ${isKu ? 'fa-arrow-right' : 'fa-arrow-left'}"></i> ${isKu ? 'گەڕانەوە' : 'Back'}</button>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 mb-16">
                    <div class="lg:col-span-2 space-y-8">
                        <div class="flex flex-wrap items-center gap-4">
                            <div class="flex flex-wrap gap-2">
                                ${(p.category || '').split(',').map(c => `<span class="bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full text-xs font-black border border-indigo-100 uppercase tracking-widest">${c.trim()}</span>`).join('')}
                            </div>
                            <span class="text-gray-400 font-bold text-sm">${p.date || ''}</span>
                        </div>
                        <h2 class="text-4xl md:text-6xl font-black text-gray-900 leading-tight">${p.title?.[currentLang] || p.title}</h2>
                        <div class="text-lg md:text-xl text-gray-700 leading-relaxed text-justify">${p.full_desc?.[currentLang] || p.full_desc || ''}</div>
                    </div>
                    <div class="space-y-6">
                        <div class="bg-white p-8 rounded-[2rem] border border-gray-100 shadow-sm space-y-6">
                            ${p.price ? `<div><p class="text-xs font-black text-gray-400 uppercase mb-1">${isKu ? 'نرخ' : 'Price'}</p><p class="text-3xl font-black text-indigo-600">${p.price}</p></div>` : ''}
                            <div class="space-y-3">
                                ${p.website_link ? `<a href="${p.website_link}" target="_blank" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-700 transition">🌐 ${isKu ? 'سەردانی وێبسایت' : 'Visit Website'}</a>` : ''}
                                ${(() => {
                                    let extras = [];
                                    try {
                                        if (Array.isArray(p.extra_links)) extras = p.extra_links;
                                        else if (typeof p.extra_links === 'string' && p.extra_links.startsWith('[')) extras = JSON.parse(p.extra_links);
                                    } catch(e) {}
                                    return (extras || []).map(l => `<a href="${l.url}" target="_blank" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-slate-900 transition">${l.is_post ? '<i class="fa-solid fa-share-nodes"></i>' : '🔗'} ${l.title?.[currentLang] || l.title}</a>`).join('');
                                })()}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-20 space-y-10">
                    <h3 class="text-3xl font-black border-b pb-4">${isKu ? 'پێشانگای پڕۆژە' : 'Gallery'}</h3>
                    <div class="relative w-full aspect-video rounded-[2.5rem] overflow-hidden bg-black shadow-2xl group">
                        <div class="absolute inset-0 z-10" id="modernSliderContainer"></div>
                        <button onclick="slideModernProject(-1)" class="absolute left-6 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/10 hover:bg-white/20 backdrop-blur rounded-full text-white text-xl z-20 opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-chevron-left"></i></button>
                        <button onclick="slideModernProject(1)" class="absolute right-6 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/10 hover:bg-white/20 backdrop-blur rounded-full text-white text-xl z-20 opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-chevron-right"></i></button>
                        <button onclick="expandProjectImage()" class="absolute top-6 right-6 w-12 h-12 bg-white/10 hover:bg-white/20 backdrop-blur rounded-full text-white text-xl z-20 opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-expand"></i></button>
                    </div>
                    <div id="projectThumbnails" class="flex flex-wrap gap-4 justify-center mt-6"></div>
                </div>

                <div class="pt-20 border-t border-gray-200 space-y-12">
                    <h3 class="text-3xl font-black text-center text-gray-900">${isKu ? 'پڕۆژەی تری پەیوەندیدار' : 'Related Projects'}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">${siteData.projects.filter(x => x.category === p.category && x.id !== p.id).slice(0, 2).map(r => `
                        <div onclick="closeProjectView(); setTimeout(()=>openProject(${siteData.projects.indexOf(r)}), 10)" class="cursor-pointer bg-white rounded-[2rem] shadow-sm hover:shadow-xl transition-all border border-gray-100 overflow-hidden flex flex-col group">
                            <div class="w-full h-56 overflow-hidden"><img src="${r.banner_image || r.images?.[0]}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"></div>
                            <div class="p-8"><p class="text-indigo-600 text-xs font-bold mb-2 uppercase">${r.category}</p><h4 class="text-2xl font-black text-gray-900">${r.title?.[currentLang] || r.title}</h4></div>
                        </div>`).join('')}</div>
                </div>

                <div class="mt-20 bg-gradient-to-br from-indigo-900 to-slate-900 rounded-[3rem] p-12 md:p-20 text-center text-white relative overflow-hidden shadow-2xl">
                    <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_2px_2px,rgba(255,255,255,0.15)_1px,transparent_0)] bg-[size:32px_32px]"></div>
                    <div class="relative z-10 space-y-8">
                        <h3 class="text-3xl md:text-5xl font-black leading-tight">${isKu ? 'بیرۆکەیەکی لەم شێوەیەت هەیە؟' : 'Have a similar project in mind?'}</h3>
                        <p class="text-slate-300 text-lg md:text-xl max-w-2xl mx-auto">${isKu ? 'با پێکەوە کار بکەین بۆ بەدیهێنانی بیرۆکەکانت و گۆڕینیان بۆ واقیع بە باشترین کوالێتی.' : 'Let\'s collaborate to bring your ideas to life and turn them into reality with premium quality.'}</p>
                        <button onclick="closeProjectView(); setTimeout(() => document.getElementById('contact').scrollIntoView({behavior:'smooth'}), 100);" class="bg-white text-indigo-900 px-10 py-5 rounded-2xl font-black text-lg hover:scale-105 transition-all shadow-xl">🚀 ${isKu ? 'با دەست پێ بکەین' : 'Let\'s Start'}</button>
                    </div>
                </div>
            </div>`;

            detail.innerHTML = html;
            
            const media = [];
            let layouts = [];
            try {
                if (Array.isArray(p.display_type)) layouts = p.display_type;
                else if (p.display_type && p.display_type.startsWith('[')) layouts = JSON.parse(p.display_type);
                else layouts = (p.display_type || '').split(',').map(c => c.trim()).filter(Boolean);
            } catch(e) { layouts = ['standard']; }
            if (layouts.length === 0) layouts = ['standard'];
            
            // 1. Add Images (Slider/Standard/Grid)
            if (layouts.includes('slider') || layouts.includes('standard') || layouts.includes('grid')) {
                (p.images || []).forEach(img => media.push({ type: 'image', url: img }));
            }
            
            // 2. Add Video
            if (layouts.includes('video') && p.video_link) {
                media.push({ type: 'video', url: p.video_link });
            }
            
            // 3. Add Iframe
            if (layouts.includes('iframe') && p.website_link) {
                media.push({ type: 'iframe', url: p.website_link });
            }

            const container = document.getElementById('modernSliderContainer');
            container.innerHTML = media.map((m, idx) => `
                <div class="slider-slide w-full h-full flex items-center justify-center ${idx === 0 ? 'active' : ''}">
                    ${m.type === 'video' || m.type === 'iframe' ? `<iframe src="${m.url}" class="w-full h-full border-0" allowfullscreen></iframe>` : `<img src="${m.url}" class="w-full h-full object-contain">`}
                </div>`).join('');

            // Thumbnails
            const thumbContainer = document.getElementById('projectThumbnails');
            thumbContainer.innerHTML = media.map((m, idx) => `
                <div onclick="setModernSlide(${idx})" class="w-20 h-20 rounded-xl overflow-hidden cursor-pointer border-2 transition ${idx === 0 ? 'border-indigo-600 scale-105' : 'border-transparent opacity-60 hover:opacity-100'}">
                    ${m.type === 'video' ? `<div class="w-full h-full bg-slate-800 flex items-center justify-center text-white"><i class="fa-solid fa-play text-xs"></i></div>` : 
                      m.type === 'iframe' ? `<div class="w-full h-full bg-emerald-600 flex items-center justify-center text-white"><i class="fa-solid fa-window-maximize text-xs"></i></div>` : 
                      `<img src="${m.url}" class="w-full h-full object-cover">`}
                </div>
            `).join('');

            modernSlideIndex = 0; startModernSlider(media.length);

            // Hash Navigation
            window.location.hash = `project/${p.id || index}`;
        }

        function setModernSlide(index) {
            const slides = document.querySelectorAll('.slider-slide');
            const thumbs = document.querySelectorAll('#projectThumbnails > div');
            if (!slides[index]) return;

            slides.forEach(s => s.classList.remove('active'));
            thumbs.forEach(t => t.classList.remove('border-indigo-600', 'scale-105'));
            thumbs.forEach(t => t.classList.add('border-transparent', 'opacity-60'));

            modernSlideIndex = index;
            slides[index].classList.add('active');
            thumbs[index].classList.add('border-indigo-600', 'scale-105');
            thumbs[index].classList.remove('border-transparent', 'opacity-60');

            startModernSlider(slides.length);
        }

        function expandProjectImage() {
            const slides = document.querySelectorAll('.slider-slide.active img');
            if (slides.length > 0) {
                document.getElementById('fullImage').src = slides[0].src;
                document.getElementById('fullImageView').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeFullView() {
            document.getElementById('fullImageView').classList.add('hidden');
            if (!document.getElementById('projectDetailView').classList.contains('hidden')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }

        function slideModernProject(direction) {
            const slides = document.querySelectorAll('.slider-slide'); if (slides.length <= 1) return;
            let nextIndex = (modernSlideIndex + direction + slides.length) % slides.length;
            setModernSlide(nextIndex);
        }

        function startModernSlider(count) {
            clearInterval(modernSliderInterval);
            if (count <= 1) return;
            modernSliderInterval = setInterval(() => slideModernProject(1), 5000);
        }

        function closeProjectView() {
            clearInterval(modernSliderInterval);
            document.getElementById('projectDetailView').classList.add('hidden');
            document.body.style.overflow = 'auto';
            window.location.hash = '';
        }

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash;
            if (hash.startsWith('#project/')) {
                const id = hash.split('/')[1];
                const index = siteData.projects.findIndex(p => p.id == id || siteData.projects.indexOf(p) == id);
                if (index !== -1 && document.getElementById('projectDetailView').classList.contains('hidden')) {
                    openProject(index);
                }
            } else if (hash === '' || hash === '#') {
                if (!document.getElementById('projectDetailView').classList.contains('hidden')) {
                    closeProjectView();
                }
            }
        });

        document.getElementById('langToggle').addEventListener('click', () => { currentLang = currentLang === 'en' ? 'ku' : 'en'; renderUI(); });
        init();
    </script>
</body>

</html>
