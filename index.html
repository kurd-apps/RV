<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Premium Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
        .fade-in { animation: fadeIn 1s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-900 text-white transition-all duration-300">

    <nav class="fixed w-full z-50 bg-gray-900/80 backdrop-blur-md p-4 border-b border-gray-800">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Portfolio</h1>
            <button id="langToggle" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg text-sm font-semibold transition">
                عربي / کوردی
            </button>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center text-center p-6 fade-in pt-24">
        <img id="profileImg" src="" alt="Profile" class="w-40 h-40 rounded-full border-4 border-blue-500 shadow-2xl mb-6 object-cover">
        <h1 id="heroName" class="text-5xl md:text-7xl font-bold mb-4">...</h1>
        <p id="heroTitle" class="text-xl md:text-2xl text-gray-400 mb-8">...</p>
        <a href="#contact" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-full font-bold shadow-lg transition transform hover:scale-105" id="btnHire">Hire Me</a>
    </section>

    <section class="py-20 bg-gray-800" id="skills">
        <div class="max-w-6xl mx-auto p-6">
            <h2 class="text-3xl font-bold mb-10 text-center border-b border-gray-700 pb-4" id="skillsTitle">Skills & Expertise</h2>
            <div id="skillsList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>
    </section>

    <section class="py-20" id="projects">
        <div class="max-w-6xl mx-auto p-6">
            <h2 class="text-3xl font-bold mb-10 text-center border-b border-gray-800 pb-4" id="projectsTitle">My Projects</h2>
            <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                </div>
        </div>
    </section>

    <section class="py-20 bg-gray-800" id="clients">
        <div class="max-w-6xl mx-auto p-6 text-center">
            <h2 class="text-3xl font-bold mb-10" id="clientsTitle">Trusted By</h2>
            <div id="clientsGrid" class="flex flex-wrap justify-center gap-8 items-center opacity-70">
                </div>
        </div>
    </section>

    <section class="py-20 bg-gray-900" id="contact">
        <div class="max-w-3xl mx-auto p-6 text-center">
            <h2 class="text-3xl font-bold mb-6" id="contactTitle">Ready to work together?</h2>
            <p class="text-gray-400 mb-8" id="contactDesc">Let's build something amazing.</p>
            <a href="mailto:your-email@example.com" class="bg-purple-600 hover:bg-purple-700 px-8 py-4 rounded-full font-bold shadow-lg transition">📧 Send an Email</a>
        </div>
    </section>

    <footer class="text-center p-6 border-t border-gray-800 text-gray-500 text-sm">
        &copy; 2026 RV. All rights reserved.
    </footer>

    <script>
        // زۆر گرنگ: لێرەدا لینکی ڕاستەوخۆی Raw دابنێ لە گیتهەبەکەتەوە
        const JSON_URL = 'https://raw.githubusercontent.com/kurd-apps/RV-portfolio/refs/heads/main/data.json';
        
        let currentLang = 'en';
        let portfolioData = null;

        async function loadData() {
            try {
                // بۆ ئەوەی وێبگەڕەکە داتاکە کەیش نەکرێت و هەمیشە تازەترین بهێنێت
                const res = await fetch(JSON_URL + '?t=' + new Date().getTime());
                portfolioData = await res.json();
                renderUI();
            } catch (error) {
                console.error("Error loading data:", error);
            }
        }

        function renderUI() {
            if (!portfolioData) return;
            const isKu = currentLang === 'ku';
            
            // گۆڕینی ئاراستەی پەڕەکە
            document.documentElement.lang = isKu ? 'ku' : 'en';
            document.documentElement.dir = isKu ? 'rtl' : 'ltr';
            document.getElementById('langToggle').innerText = isKu ? 'English' : 'کوردی';

            // داتای پڕۆفایل
            document.getElementById('profileImg').src = portfolioData.profile.image;
            document.getElementById('heroName').innerText = portfolioData.profile.name[currentLang];
            document.getElementById('heroTitle').innerText = portfolioData.profile.title[currentLang];
            
            // وەرگێڕانی جێگیر
            document.getElementById('btnHire').innerText = isKu ? 'داواکردنی کار' : 'Hire Me';
            document.getElementById('skillsTitle').innerText = isKu ? 'شارەزاییەکانم' : 'Skills & Expertise';
            document.getElementById('projectsTitle').innerText = isKu ? 'کارەکانم' : 'My Projects';
            document.getElementById('clientsTitle').innerText = isKu ? 'کۆمپانیاکان' : 'Trusted By';
            document.getElementById('contactTitle').innerText = isKu ? 'ئامادەی بۆ کارکردن پێکەوە؟' : 'Ready to work together?';
            document.getElementById('contactDesc').innerText = isKu ? 'با پێکەوە شتێکی نایاب دروست بکەین.' : 'Let\'s build something amazing.';

            // سکیلەکان
            const skillsHTML = portfolioData.skills.map(s => `
                <div class="bg-gray-700 p-4 rounded-lg shadow-md">
                    <div class="flex justify-between mb-1">
                        <span class="font-bold">${s.name[currentLang]}</span>
                        <span>${s.level}</span>
                    </div>
                    <div class="w-full bg-gray-900 rounded-full h-2.5">
                        <div class="bg-blue-500 h-2.5 rounded-full" style="width: ${s.level}"></div>
                    </div>
                </div>
            `).join('');
            document.getElementById('skillsList').innerHTML = skillsHTML;

            // پرۆژەکان
            const projectsHTML = portfolioData.projects.map(p => `
                <div class="bg-gray-800 rounded-xl overflow-hidden shadow-lg hover:shadow-2xl transition group cursor-pointer" onclick="alert('${p.desc[currentLang]}')">
                    <img src="${p.image}" class="w-full h-48 object-cover group-hover:scale-110 transition duration-500">
                    <div class="p-6">
                        <h3 class="text-xl font-bold mb-2">${p.title[currentLang]}</h3>
                        <p class="text-gray-400 text-sm line-clamp-2">${p.desc[currentLang]}</p>
                    </div>
                </div>
            `).join('');
            document.getElementById('projectsGrid').innerHTML = projectsHTML;

            // کڕیارەکان
            const clientsHTML = portfolioData.clients.map(c => `<img src="${c.logo}" alt="${c.name}" class="h-12 grayscale hover:grayscale-0 transition">`).join('');
            document.getElementById('clientsGrid').innerHTML = clientsHTML;
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ku' : 'en';
            renderUI();
        });

        loadData();
    </script>
</body>
</html>
